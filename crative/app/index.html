<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover The Best of You</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #030305;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            height: 400vh; /* Scroll room */
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        .ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2;
            display: flex;
            pointer-events: none; 
        }

        .left-half { flex: 1; }

        .right-half {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        h1 {
            font-size: 4.5rem;
            font-weight: 300;
            margin: 0;
            letter-spacing: -1px;
            line-height: 1.1;
            background: linear-gradient(90deg, #ffffff, #888888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: right;
            padding-right: 15%;
        }

        .scroll-indicator {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            font-size: 0.85rem;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.5);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translate(-50%, 0); }
            40% { transform: translate(-50%, -10px); }
            60% { transform: translate(-50%, -5px); }
        }

        /* Loading Screen */
        #loading {
            position: fixed;
            top: 50%;
            left: 25%;
            transform: translate(-50%, -50%);
            z-index: 10;
            font-size: 1.2rem;
            color: #888;
        }

        @media (max-width: 768px) {
            .ui-layer { flex-direction: column; }
            h1 { font-size: 2.5rem; text-align: center; padding: 0 5%; margin-top: 60vh;}
            #loading { left: 50%; top: 30%; }
        }
    </style>
</head>
<body>

    <div id="loading">Scanning Banknote...</div>
    <div id="canvas-container"></div>

    <div class="ui-layer">
        <div class="left-half"></div>
        <div class="right-half">
            <h1>Discover the<br>best of you</h1>
        </div>
    </div>

    <div class="scroll-indicator" id="scroll-hint">SCROLL DOWN ↓</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });

        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        let particles, particleGroup, particleCount;
        let initialPositions, targetPositions;

        const img = new Image();
        img.src = 'rm100.jpg'; 
        
        img.onload = () => {
            document.getElementById('loading').style.display = 'none';

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            // Scaled down slightly to manage performance
            const scale = 0.5; 
            // FIX: Using Math.floor ensures we don't get misaligned edge calculations
            canvas.width = Math.floor(img.width * scale);
            canvas.height = Math.floor(img.height * scale);
            
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            
            const noteCoordinates = [];
            const colors = [];

            for (let y = 0; y < canvas.height; y += 3) { 
                for (let x = 0; x < canvas.width; x += 3) {
                    const index = (y * canvas.width + x) * 4;
                    const r = imgData[index];
                    const g = imgData[index + 1];
                    const b = imgData[index + 2];
                    const a = imgData[index + 3];
                    
                    // FIX: Much more forgiving color threshold. 
                    // This will only skip pure white background pixels or transparent pixels,
                    // preserving the bright glare/security threads on the note.
                    if (a > 10 && (r < 254 || g < 254 || b < 254)) {
                        const pX = (x - canvas.width / 2) / 100; 
                        const pY = -(y - canvas.height / 2) / 100;
                        
                        noteCoordinates.push({ x: pX, y: pY });
                        colors.push(r / 255, g / 255, b / 255);
                    }
                }
            }

            particleCount = noteCoordinates.length;
            const geometry = new THREE.BufferGeometry();
            
            const positions = new Float32Array(particleCount * 3);
            const colorArray = new Float32Array(colors);
            initialPositions = new Float32Array(particleCount * 3);
            targetPositions = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount; i++) {
                const startX = noteCoordinates[i].x;
                const startY = noteCoordinates[i].y;
                const startZ = (Math.random() - 0.5) * 0.2;

                initialPositions[i * 3] = startX;
                initialPositions[i * 3 + 1] = startY;
                initialPositions[i * 3 + 2] = startZ;

                const spreadRadius = (Math.random() * 40) + 2; 
                const spreadTheta = Math.random() * Math.PI * 2;
                const spreadPhi = Math.acos((Math.random() * 2) - 1);
                
                targetPositions[i * 3] = spreadRadius * Math.sin(spreadPhi) * Math.cos(spreadTheta) + 4;
                targetPositions[i * 3 + 1] = spreadRadius * Math.sin(spreadPhi) * Math.sin(spreadTheta);
                targetPositions[i * 3 + 2] = spreadRadius * Math.cos(spreadPhi);

                positions[i * 3] = startX;
                positions[i * 3 + 1] = startY;
                positions[i * 3 + 2] = startZ;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));

            const material = new THREE.PointsMaterial({
                size: 0.05,
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending
            });

            particles = new THREE.Points(geometry, material);
            
            particleGroup = new THREE.Group();
            particleGroup.position.x = -4; 
            particleGroup.add(particles);
            scene.add(particleGroup);

            animate();
        };

        img.onerror = () => {
            document.getElementById('loading').innerHTML = "Error: Could not load image.";
            document.getElementById('loading').style.color = "red";
        };

        camera.position.z = 8;

        let scrollPercent = 0;
        const scrollHint = document.getElementById('scroll-hint');

        window.addEventListener('scroll', () => {
            scrollPercent = (document.documentElement.scrollTop || document.body.scrollTop) / 
                            ((document.documentElement.scrollHeight || document.body.scrollHeight) - document.documentElement.clientHeight);
        });

        function animate() {
            requestAnimationFrame(animate);

            if (!particles) return;

            particles.rotation.y += 0.01; 
            particles.rotation.x = scrollPercent * 1.5; 

            const positionsAttribute = particles.geometry.getAttribute('position');
            const currentPos = positionsAttribute.array;
            const easeProgress = Math.pow(scrollPercent, 1.2);

            for (let i = 0; i < particleCount * 3; i++) {
                currentPos[i] = THREE.MathUtils.lerp(initialPositions[i], targetPositions[i], easeProgress);
            }
            positionsAttribute.needsUpdate = true;

            if(scrollPercent > 0.01) {
                scrollHint.style.opacity = Math.max(0, 0.5 - (scrollPercent * 10));
            } else {
                scrollHint.style.opacity = 0.5;
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            
            if(particleGroup) {
                if(window.innerWidth < 768) {
                    particleGroup.position.y = 3;
                    particleGroup.position.x = 0;
                } else {
                    particleGroup.position.y = 0;
                    particleGroup.position.x = -4;
                }
            }
        });
    </script>
</body>
</html>
